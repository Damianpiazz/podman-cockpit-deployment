# ============================================================
# Podman/Docker Compose — Frontend Stack
# Services: Nginx + Next.js Commerce
# ============================================================

services:
  # ----------------------------------------------------------
  # Nginx — Reverse proxy SSL
  # ----------------------------------------------------------
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx-ecommerce
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - nextjs
    restart: unless-stopped
    networks:
      - frontend

  # ----------------------------------------------------------
  # Next.js Commerce — Storefront standalone
  # ----------------------------------------------------------
  nextjs:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nextjs-ecommerce
    environment:
      - NEXT_PUBLIC_BASE_URL=http://localhost
      - NEXT_PUBLIC_DEFAULT_REGION=us
    restart: unless-stopped
    networks:
      - frontend

# ============================================================
# Networks
# ============================================================
networks:
  frontend:
    driver: bridge
